name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Build
        run: ./build.sh

      - name: Zip app bundle
        run: |
          cd .build
          zip -r DailyPhotos.app.zip DailyPhotos.app

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: .build/DailyPhotos.app.zip
          generate_release_notes: true
